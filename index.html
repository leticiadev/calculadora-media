<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="./style.css">
    <title>Calculadora Media</title>
</head>
<body>
    <main class="container">
        <h1>Calculadora de Média</h1>
        <p>Insira as notas abaixo:</p>

        <div class="campo">
            <label for="nome">Nome do aluno</label>
            <input type="text" id="nome" placeholder="Digite o nome do aluno">
        </div>
         <div class="campo">
            <label for="nota1">Nota 1</label>
            <input type="text" id="nota1" placeholder="Digite a primeira nota">
        </div>
        <div class="campo">
            <label for="nota2">Nota 2</label>
            <input type="text" id="nota2" placeholder="Digite a segunda nota">
        </div>
        <div class="campo">
            <label for="nota3">Nota 3</label>
            <input type="text" id="nota3" placeholder="Digite a terceira nota">
        </div>
        <button id="btnCalcular">Calcular Média</button>
        <div class="resultado" id="resultado">Resultado</div>

    </main>
    <script type = "module" src="js/app.js"></script>
</body>
</html>
